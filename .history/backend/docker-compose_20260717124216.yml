services:
  postgres:
    image: postgres:17
    container_name: edushare-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: edushare
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  backend:
    build: .
    container_name: edushare-backend
    restart: always
    depends_on:
      - postgres
    env_file:
      - .env
    ports:
      - "3000:3000"
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: edushare-jaeger
    restart: always
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
    - "16686:16686"
    - "4317:4317"
    - "4318:4318"
volumes:
  postgres_data: