services:
  postgres:
    image: postgres:17
    container_name: edushare-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: edushare
    ports:
      - "5432:5432"
    volumes:
       - backend_postgres_data:/var/lib/postgresql/data
  backend:
    build:
      context: ./backend
    container_name: edushare-backend
    restart: always
    depends_on:
      - postgres
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ./backend/src/uploads:/app/src/uploads
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: edushare-jaeger
    restart: always
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
    - "16686:16686"
    - "4317:4317"
    - "4318:4318"
  grafana:
    image: grafana/grafana:latest
    container_name: edushare-grafana
    ports:
      - "3001:3000"
    depends_on:
      - jaeger
    volumes:
      - grafana_data:/var/lib/grafana
volumes:
  backend_postgres_data:
    external: true
  grafana_data: